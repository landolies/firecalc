<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FireCalc JS engine — fixture harness</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 2rem; color: #222; }
  h1 { margin-top: 0; }
  .banner { background: #fff7e6; border: 1px solid #f0c36d; padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: .9rem; }
  .summary { font-size: 1.25rem; margin: 1rem 0; }
  .pass { color: #1a7f37; font-weight: 600; }
  .fail { color: #b11616; font-weight: 600; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: .4rem .75rem; border-bottom: 1px solid #eee; vertical-align: top; font-size: .9rem; }
  th { background: #f6f8fa; }
  tr.fail-row { background: #fff5f5; }
  tr.pass-row td:first-child::before { content: "✓ "; color: #1a7f37; }
  tr.fail-row td:first-child::before { content: "✗ "; color: #b11616; }
  pre { margin: 0; white-space: pre-wrap; font-size: .8rem; font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
<h1>FireCalc JS engine — fixture harness</h1>
<div class="banner">
  If you opened this via <code>file://</code> and see a fetch error, serve locally:
  <code>python3 -m http.server 8000</code> from the repo root, then open
  <code>http://localhost:8000/web/tests/run_tests.html</code>.
</div>
<div class="summary" id="summary">Running…</div>
<table id="results">
  <thead>
    <tr><th>Scenario</th><th>First divergence (if any)</th></tr>
  </thead>
  <tbody></tbody>
</table>

<script src="../vendor/decimal.min.js"></script>
<script src="../engine.js"></script>
<script>
(async function () {
  const summary = document.getElementById("summary");
  const tbody = document.querySelector("#results tbody");

  let fixtures;
  try {
    const res = await fetch("../../fixtures/scenarios.json");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    fixtures = await res.json();
  } catch (e) {
    summary.innerHTML = `<span class="fail">Could not load fixtures: ${e.message}</span>`;
    return;
  }

  // Deep compare JSON-able values. Return `null` if equal, otherwise a string
  // like "result.annual_pension_3yr: expected 'X', got 'Y'".
  function diff(expected, actual, path) {
    if (typeof expected !== typeof actual) {
      return `${path}: type mismatch (expected ${typeof expected}, got ${typeof actual})`;
    }
    if (expected === null || actual === null) {
      return expected === actual ? null : `${path}: expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`;
    }
    if (Array.isArray(expected)) {
      if (!Array.isArray(actual)) return `${path}: expected array, got ${typeof actual}`;
      if (expected.length !== actual.length) return `${path}: length ${expected.length} vs ${actual.length}`;
      for (let i = 0; i < expected.length; i++) {
        const d = diff(expected[i], actual[i], `${path}[${i}]`);
        if (d) return d;
      }
      return null;
    }
    if (typeof expected === "object") {
      const eKeys = Object.keys(expected).sort();
      const aKeys = Object.keys(actual).sort();
      if (JSON.stringify(eKeys) !== JSON.stringify(aKeys)) {
        return `${path}: keys differ (expected [${eKeys}], got [${aKeys}])`;
      }
      for (const k of eKeys) {
        const d = diff(expected[k], actual[k], path ? `${path}.${k}` : k);
        if (d) return d;
      }
      return null;
    }
    return expected === actual ? null : `${path}: expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`;
  }

  let passCount = 0;
  const failures = [];

  for (const fx of fixtures) {
    const row = document.createElement("tr");
    const nameCell = document.createElement("td");
    const diffCell = document.createElement("td");
    nameCell.textContent = fx.name;

    let divergence = null;
    try {
      const inputs = firecalc.hydrateInputs(fx.inputs);
      const result = firecalc.computeRetirementScenario(inputs);
      const actual = firecalc.toJsonable(result);
      divergence = diff(fx.result, actual, "result");
    } catch (e) {
      divergence = `threw: ${e.message}\n${e.stack || ""}`;
    }

    if (divergence === null) {
      row.className = "pass-row";
      passCount++;
    } else {
      row.className = "fail-row";
      failures.push({ name: fx.name, divergence });
      const pre = document.createElement("pre");
      pre.textContent = divergence;
      diffCell.appendChild(pre);
    }
    row.appendChild(nameCell);
    row.appendChild(diffCell);
    tbody.appendChild(row);
  }

  const total = fixtures.length;
  if (passCount === total) {
    summary.innerHTML = `<span class="pass">${passCount}/${total} passing</span>`;
  } else {
    summary.innerHTML = `<span class="fail">${passCount}/${total} passing — ${failures.length} failure(s)</span>`;
  }
})();
</script>
</body>
</html>
